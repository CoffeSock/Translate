
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Language Translator</title>

    <style>

        body {
            background: #0f0f0f;
            color: white;
            font-family: Arial, sans-serif;
            padding: 40px;
            text-align: center;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 20px;
        }

        textarea {
            width: 80%;
            max-width: 900px;
            height: 140px;
            font-size: 24px;
            padding: 15px;
            border-radius: 12px;
            border: none;
            resize: none;
            background: #1d1d1d;
            color: white;
            outline: none;
        }

        button {
            margin-top: 20px;
            padding: 14px 30px;
            font-size: 22px;
            border: none;
            border-radius: 12px;
            background: #444;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #666;
        }

        #output {
            margin-top: 40px;
            min-height: 120px;
            padding: 20px;
            background: #1a1a1a;
            border-radius: 16px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        .letter {
            width: 60px;
            height: 60px;
            object-fit: contain;
        }

        .space {
            width: 30px;
            height: 60px;
        }

        .newline {
            width: 100%;
            height: 20px;
        }

    </style>
</head>
<body>

    <h1>Custom Language Translator</h1>

    <textarea
        id="input"
        placeholder="Type English here..."
    ></textarea>

    <br>

    <button onclick="translateText()">
        Translate
    </button>

    <div id="output"></div>

    <script>

        function translateText() {

            const text =
                document.getElementById("input")
                .value
                .toUpperCase();

            const output =
                document.getElementById("output");

            output.innerHTML = "";

            for (let char of text) {

                // SPACE
                if (char === " ") {

                    const spacer =
                        document.createElement("div");

                    spacer.className = "space";

                    output.appendChild(spacer);
                }

                // NEW LINE
                else if (char === "\n") {

                    const br =
                        document.createElement("div");

                    br.className = "newline";

                    output.appendChild(br);
                }

                // LETTERS
                else if (/^[A-Z]$/.test(char)) {

                    const img =
                        document.createElement("img");

                    img.src = `Letters/${char}.png`;

                    img.className = "letter";

                    img.alt = char;

                    output.appendChild(img);
                }

                // PUNCTUATION
                else {

                    const span =
                        document.createElement("span");

                    span.textContent = char;

                    span.style.fontSize = "40px";

                    output.appendChild(span);
                }
            }
        }

    </script>

</body>
</html>
